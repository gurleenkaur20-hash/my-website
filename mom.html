<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hello mumma</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    animation: float 3s ease-in-out infinite;
}

h1 {
    color: #ff4d6d;
    font-size: 2.5em;
}

p {
    font-size: 1.2em;
    color: #555;
}

.heart {
    font-size: 50px;
    animation: beat 1s infinite;
}

@keyframes beat {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}
</style>
</head>

<body>

<div class="card">
    <div class="heart">❤️</div>
    <h1>Love You Mom</h1>
    <p>Thank you for your endless love, care, and support.</p>
    <p>You are my hero and my best friend! 🌸</p>
</div>

</body>
</html>
